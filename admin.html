<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KicksFusion — Admin Dashboard</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <!-- ========== LOGIN SCREEN ========== -->
  <div class="login-screen" id="login-screen">
    <div class="login-card">
      <div class="login-logo">KICKSFUSION</div>
      <p class="login-sub">Admin Dashboard — Authorized Access Only</p>
      <div class="login-field">
        <label for="login-user">Username</label>
        <input type="text" id="login-user" placeholder="Enter username" autocomplete="off" />
      </div>
      <div class="login-field">
        <label for="login-pass">Password</label>
        <input type="password" id="login-pass" placeholder="Enter password" />
      </div>
      <button class="login-btn" id="login-btn">Sign In</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- ========== DASHBOARD ========== -->
  <div class="dashboard" id="dashboard">
    <!-- Header -->
    <header class="dash-header">
      <div class="dash-logo">KICKS<span>FUSION</span> ADMIN</div>
      <div class="dash-user">
        <a href="index.html" class="dash-link">← Store</a>
        <span id="dash-username"></span>
        <div class="dash-avatar" id="dash-avatar"></div>
        <button class="dash-logout" id="dash-logout">Logout</button>
      </div>
    </header>

    <!-- Stats -->
    <div class="dash-stats" id="dash-stats"></div>

    <!-- Products -->
    <div class="dash-content">
      <div class="dash-section-header">
        <h2 class="dash-section-title">All Products</h2>
        <button class="add-product-btn" id="add-product-btn">
          <span>＋</span> Add Product
        </button>
      </div>
      <div class="product-table-wrap">
        <table class="product-table" id="product-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Category</th>
              <th>Price</th>
              <th>Sizes</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="product-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ========== ADD/EDIT PRODUCT MODAL ========== -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title">Add New Product</h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Product Images</label>
          <div class="image-upload-area" id="image-upload-area">
            <div class="upload-icon">📸</div>
            <div class="upload-text"><strong>Click to upload</strong> or drag & drop<br/>JPG, PNG up to 5MB each</div>
            <input type="file" id="image-input" accept="image/*" multiple hidden />
          </div>
          <div class="image-previews" id="image-previews"></div>
        </div>

        <div class="form-group">
          <label for="prod-name">Product Title</label>
          <input type="text" id="prod-name" placeholder="e.g. Nike SB Dunk Low Supreme Rammellzee" />
        </div>

        <div class="form-group">
          <label for="prod-brand">Brand</label>
          <input type="text" id="prod-brand" placeholder="e.g. Nike, Adidas, Converse" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="prod-price">Offer Price (₹)</label>
            <input type="number" id="prod-price" placeholder="e.g. 3500" />
          </div>
          <div class="form-group">
            <label for="prod-old-price">Original Price (₹) — optional</label>
            <input type="number" id="prod-old-price" placeholder="e.g. 4000" />
          </div>
        </div>

        <div class="form-group">
          <label for="prod-category">Category</label>
          <select id="prod-category">
            <option value="casual">Casual</option>
            <option value="sports">Sports</option>
            <option value="basketball">Basketball</option>
            <option value="sale">Sale</option>
          </select>
        </div>

        <div class="form-group">
          <label for="prod-badge">Badge</label>
          <select id="prod-badge">
            <option value="">None</option>
            <option value="hot">Hot 🔥</option>
            <option value="new">New</option>
            <option value="exclusive">Exclusive</option>
            <option value="sale">Sale</option>
          </select>
        </div>

        <div class="form-group">
          <label>Sizes (select available)</label>
          <div class="sizes-grid" id="sizes-grid"></div>
        </div>

        <div class="form-group">
          <label for="prod-material">Material</label>
          <input type="text" id="prod-material" placeholder="e.g. Premium leather, suede overlays" />
        </div>

        <div class="form-group">
          <label for="prod-desc">Description</label>
          <textarea id="prod-desc" rows="4" placeholder="Detailed product description..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-cancel" id="modal-cancel">Cancel</button>
        <button class="modal-save" id="modal-save">Save Product</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="admin-toast" id="admin-toast"></div>

  <script src="products.js"></script>
  <script src="admin.js"></script>
</body>
</html>
